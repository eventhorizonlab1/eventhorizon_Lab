<!DOCTYPE html>
<html>
<body>
<input type="file" id="file" onchange="test(this)" />
<script>
async function compressImage(file, maxWidth = 1600, maxHeight = 1600, quality = 0.75) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                let width = img.width;
                let height = img.height;
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                canvas.toBlob((blob) => {
                    console.log("Blob type 1: ", blob.type);
                    if (blob.type !== 'image/webp') {
                        canvas.toBlob((jpegBlob) => {
                            console.log("Blob type 2: ", jpegBlob.type);
                            resolve(jpegBlob);
                        }, 'image/jpeg', quality);
                        return;
                    }
                    resolve(blob);
                }, 'image/webp', quality);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}
async function test(input) {
    const file = input.files[0];
    const compressed = await compressImage(file);
    console.log("Final type:", compressed.type);
}
</script>
</body>
</html>
